naftiko: "1.0.0-alpha1"

info:
  label: Agilent Laboratory Operations
  description: >-
    Unified laboratory operations capability combining iLab core facility management
    for billing, scheduling, service requests, and reporting. Used by core facility
    managers, research administrators, and principal investigators to manage lab
    operations and integrate with institutional financial systems.
  tags:
    - Agilent
    - Laboratory Operations
    - Core Facilities
    - Billing
    - Scheduling
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ILAB_API_TOKEN: ILAB_API_TOKEN

capability:
  consumes:
    - import: ilab
      location: ./shared/ilab-operations-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: lab-operations-api
      description: Unified REST API for laboratory operations management.
      resources:
        - path: /v1/cores
          name: cores
          description: Core facility discovery and management.
          operations:
            - method: GET
              name: list-cores
              description: List all accessible core facilities.
              call: "ilab.list-cores"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/services
          name: services
          description: Laboratory services and pricing.
          operations:
            - method: GET
              name: list-services
              description: List services offered by a core facility.
              call: "ilab.list-services"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/service-requests
          name: service-requests
          description: Service request lifecycle management.
          operations:
            - method: GET
              name: list-service-requests
              description: List service requests for a core facility.
              call: "ilab.list-service-requests"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-service-request
              description: Submit a new service request.
              call: "ilab.create-service-request"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reservations
          name: reservations
          description: Equipment scheduling and reservations.
          operations:
            - method: GET
              name: list-reservations
              description: List equipment reservations.
              call: "ilab.list-reservations"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/invoices
          name: invoices
          description: Billing and financial reporting.
          operations:
            - method: GET
              name: list-invoices
              description: List billing invoices for a core facility.
              call: "ilab.list-invoices"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/projects
          name: projects
          description: Research projects and cost account management.
          operations:
            - method: GET
              name: list-projects
              description: List research projects for billing.
              call: "ilab.list-projects"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: lab-operations-mcp
      transport: http
      description: MCP server for AI-assisted laboratory operations management.
      tools:
        - name: list-cores
          description: List all core facilities accessible to the authenticated user.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-cores"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-core
          description: Get details about a specific core facility by ID.
          hints:
            readOnly: true
            openWorld: false
          call: "ilab.get-core"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-services
          description: List services offered by a core facility.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-services"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-prices
          description: List pricing tiers for a specific service.
          hints:
            readOnly: true
            openWorld: false
          call: "ilab.list-service-prices"
          with:
            core_id: "tools.core_id"
            service_id: "tools.service_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-service-price
          description: Update the price for a service pricing tier.
          hints:
            readOnly: false
            idempotent: true
          call: "ilab.update-service-price"
          with:
            core_id: "tools.core_id"
            service_id: "tools.service_id"
            price_id: "tools.price_id"
            amount: "tools.amount"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-requests
          description: List service requests submitted to a core facility, optionally filtered by status.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-service-requests"
          with:
            core_id: "tools.core_id"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-service-request
          description: Submit a new service request to a core facility for a research project.
          hints:
            readOnly: false
            openWorld: false
          call: "ilab.create-service-request"
          with:
            core_id: "tools.core_id"
            service_id: "tools.service_id"
            project_id: "tools.project_id"
            quantity: "tools.quantity"
            notes: "tools.notes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reservations
          description: List equipment reservations for a core facility within a date range.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-reservations"
          with:
            core_id: "tools.core_id"
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-invoices
          description: List billing invoices generated by a core facility, optionally filtered by status.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-invoices"
          with:
            core_id: "tools.core_id"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-members
          description: List members of a core facility.
          hints:
            readOnly: true
            openWorld: false
          call: "ilab.list-members"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: List research projects and cost accounts for billing purposes.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-projects"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
