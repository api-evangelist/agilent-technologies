naftiko: 1.0.0-alpha2
info:
  label: Agilent iLab Operations API — Members
  description: 'Agilent iLab Operations API — Members. 1 operations. Lead operation: Agilent iLab List Members. Self-contained
    Naftiko capability covering one Agilent Technologies business surface.'
  tags:
  - Agilent Technologies
  - Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AGILENT_TECHNOLOGIES_API_KEY: AGILENT_TECHNOLOGIES_API_KEY
capability:
  consumes:
  - type: http
    namespace: agilent-ilab-operations-members
    baseUri: https://api.ilabsolutions.com/v1
    description: Agilent iLab Operations API — Members business capability. Self-contained, no shared references.
    resources:
    - name: cores-core_id-members
      path: /cores/{core_id}/members
      operations:
      - name: listmembers
        method: GET
        description: Agilent iLab List Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: core_id
          in: path
          type: integer
          description: Unique identifier for the core facility.
          required: true
    authentication:
      type: bearer
      token: '{{env.AGILENT_TECHNOLOGIES_API_KEY}}'
  exposes:
  - type: rest
    namespace: agilent-ilab-operations-members-rest
    port: 8080
    description: REST adapter for Agilent iLab Operations API — Members. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/cores/{core-id}/members
      name: cores-core-id-members
      description: REST surface for cores-core_id-members.
      operations:
      - method: GET
        name: listmembers
        description: Agilent iLab List Members
        call: agilent-ilab-operations-members.listmembers
        with:
          core_id: rest.core_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: agilent-ilab-operations-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Agilent iLab Operations API — Members. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: agilent-ilab-list-members
      description: Agilent iLab List Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: agilent-ilab-operations-members.listmembers
      with:
        core_id: tools.core_id
      outputParameters:
      - type: object
        mapping: $.
