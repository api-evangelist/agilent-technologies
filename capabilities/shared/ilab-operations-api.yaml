naftiko: "1.0.0-alpha1"

info:
  label: Agilent iLab Operations API
  description: Core facility operations management API for billing, scheduling, service requests, and reporting.
  tags:
    - Agilent
    - Laboratory Operations
    - Core Facilities
    - Billing
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ILAB_API_TOKEN: ILAB_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: ilab
      baseUri: https://api.ilabsolutions.com/v1
      description: iLab Operations API for core facility billing, scheduling, and reporting.
      authentication:
        type: bearer
        token: "{{ILAB_API_TOKEN}}"
      resources:
        - name: cores
          path: /cores
          description: Core facility resources — the root resource of the API.
          operations:
            - name: list-cores
              method: GET
              description: Returns a list of all core facilities accessible to the authenticated user.
              inputParameters:
                - name: institution_id
                  in: query
                  type: integer
                  required: false
                  description: Filter cores by institution identifier.
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: Page number for paginated results.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-core
              method: GET
              description: Returns detailed information about a specific core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Unique identifier for the core facility.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: services
          path: /cores/{core_id}/services
          description: Services and price lists offered by a core facility.
          operations:
            - name: list-services
              method: GET
              description: Returns a list of all services offered by a core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-service-prices
              method: GET
              description: Returns all prices for a given service.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
                - name: service_id
                  in: path
                  type: integer
                  required: true
                  description: Service identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-service-price
              method: PUT
              description: Updates the price for a specific pricing tier of a service.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
                - name: service_id
                  in: path
                  type: integer
                  required: true
                  description: Service identifier.
                - name: price_id
                  in: path
                  type: integer
                  required: true
                  description: Price record identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  amount: "{{tools.amount}}"
                  currency: "{{tools.currency}}"
        - name: service-requests
          path: /cores/{core_id}/service_requests
          description: Service request submissions and management.
          operations:
            - name: list-service-requests
              method: GET
              description: Returns service requests submitted to a core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by request status.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-service-request
              method: POST
              description: Submits a new service request to a core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  service_id: "{{tools.service_id}}"
                  project_id: "{{tools.project_id}}"
                  quantity: "{{tools.quantity}}"
                  notes: "{{tools.notes}}"
        - name: reservations
          path: /cores/{core_id}/reservations
          description: Equipment reservations and scheduling.
          operations:
            - name: list-reservations
              method: GET
              description: Returns equipment reservations for a core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: Start date for reservation query (ISO 8601).
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: End date for reservation query (ISO 8601).
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: invoices
          path: /cores/{core_id}/invoices
          description: Billing invoices and financial records.
          operations:
            - name: list-invoices
              method: GET
              description: Returns billing invoices generated by a core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by invoice status.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: members
          path: /cores/{core_id}/members
          description: Core facility membership and user management.
          operations:
            - name: list-members
              method: GET
              description: Returns members of a core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: projects
          path: /cores/{core_id}/projects
          description: Research projects and cost accounts.
          operations:
            - name: list-projects
              method: GET
              description: Returns research projects and cost accounts associated with a core facility.
              inputParameters:
                - name: core_id
                  in: path
                  type: integer
                  required: true
                  description: Core facility identifier.
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ilab-rest
      resources:
        - path: /v1/cores
          name: cores
          description: Core facility management.
          operations:
            - method: GET
              name: list-cores
              description: List all accessible core facilities.
              call: "ilab.list-cores"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/cores/{core_id}/services
          name: services
          description: Services offered by a core facility.
          operations:
            - method: GET
              name: list-services
              description: List services for a core facility.
              call: "ilab.list-services"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/cores/{core_id}/service-requests
          name: service-requests
          description: Service request management.
          operations:
            - method: GET
              name: list-service-requests
              description: List service requests for a core facility.
              call: "ilab.list-service-requests"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-service-request
              description: Submit a new service request.
              call: "ilab.create-service-request"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/cores/{core_id}/invoices
          name: invoices
          description: Billing invoice management.
          operations:
            - method: GET
              name: list-invoices
              description: List invoices for a core facility.
              call: "ilab.list-invoices"
              with:
                core_id: "rest.core_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ilab-mcp
      transport: http
      tools:
        - name: list-cores
          description: List all accessible core facilities.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-cores"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-core
          description: Get details about a specific core facility.
          hints:
            readOnly: true
            openWorld: false
          call: "ilab.get-core"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-services
          description: List services offered by a core facility.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-services"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-prices
          description: List prices for a service.
          hints:
            readOnly: true
            openWorld: false
          call: "ilab.list-service-prices"
          with:
            core_id: "tools.core_id"
            service_id: "tools.service_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-service-requests
          description: List service requests submitted to a core facility.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-service-requests"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-service-request
          description: Submit a new service request to a core facility.
          hints:
            readOnly: false
            openWorld: false
          call: "ilab.create-service-request"
          with:
            core_id: "tools.core_id"
            service_id: "tools.service_id"
            project_id: "tools.project_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-reservations
          description: List equipment reservations for a core facility.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-reservations"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-invoices
          description: List billing invoices generated by a core facility.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-invoices"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-members
          description: List members of a core facility.
          hints:
            readOnly: true
            openWorld: false
          call: "ilab.list-members"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-projects
          description: List research projects and cost accounts for a core facility.
          hints:
            readOnly: true
            openWorld: true
          call: "ilab.list-projects"
          with:
            core_id: "tools.core_id"
          outputParameters:
            - type: object
              mapping: "$."
