provider: Agilent Technologies
providerId: agilent-technologies
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Life Sciences
  - Diagnostics
  - Laboratory
  - Scientific Instruments
  - LIMS
  - Rate Limiting
description: Agilent does not publish public rate-limit documentation for its product APIs (iLab,
  SLIMS, CrossLab, VWorks). SLIMS is typically self-hosted (limits set by the customer's deployment),
  iLab is multi-tenant SaaS with internal throttling, and CrossLab / VWorks limits are governed by the
  service contract. Consumers should treat 429 / Retry-After as the canonical throttling signal and
  request limit details from their Agilent account team.
notes: No public rate-limit documentation; values are placeholders pending direct confirmation from
  the customer's Agilent account team.
sources:
  - https://www.agilent.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-product limits
    scope: account
    metric: varies
    limit: defined per product / contract
    notes: SLIMS deployments inherit the customer's hosting capacity; iLab, CrossLab, and VWorks limits
      are set by Agilent's service contract.
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 / 503 responses,
      honoring Retry-After when present.
  - name: Self-Hosted Capacity (SLIMS)
    description: For on-premise SLIMS, throughput is bounded by the customer's deployed infrastructure
      rather than an Agilent-imposed cap.
  - name: Contractual Limits
    description: For SaaS products (iLab, CrossLab), API throughput and concurrency are governed by the
      Agilent service contract; raise via the assigned account team.
maintainers:
