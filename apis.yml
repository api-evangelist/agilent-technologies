  - name: Agilent SLIMS REST API
    description: >-
      The SLIMS (Smart Laboratory Information Management System) REST API
      provides programmatic access to Agilent SLIMS laboratory data management
      platform. SLIMS features three APIs — REST, Java, and Python — enabling
      integration with analytical instruments, NGS workflows, biobanks, and R&D
      labs. The REST API is auto-documented within each SLIMS instance.
    humanURL: https://slims-python-api.readthedocs.io/
    baseURL: https://your-slims-instance/rest
    tags:
      - LIMS
      - Laboratory Information Management
      - NGS
      - Biobank
    properties:
      - type: Documentation
        url: https://community.agilent.com/cfs-file/__key/docpreview-s/00-00-02-00-89/slims_5F00_development_5F00_manual_2D00_6.9.29.pdf
        title: SLIMS Development Manual v6.9
      - type: SDK
        url: https://github.com/genohm/slims-python-api
        title: Python SDK
      - type: SDK
        url: https://github.com/genohm/slims-api
        title: Plugin API
  - name: Agilent CrossLab Asset Manager API
    description: >-
      The CrossLab Asset Manager API provides programmatic access to Agilent's
      CrossLab instrument services platform, enabling management of laboratory
      assets, instrument service records, maintenance scheduling, and compliance
      tracking across laboratory environments.
    humanURL: https://crosslab-api.agilent.com/
    baseURL: https://crosslab-api.agilent.com
    tags:
      - Asset Management
      - Instrument Services
      - CrossLab
      - Maintenance
    properties:
      - type: Documentation
        url: https://crosslab-api.agilent.com/
  - name: Agilent VWorks Automation API
    description: >-
      The VWorks API provides a Component Object Model (COM) application
      programming interface for VWorks laboratory automation software (version
      14.0 and later). It enables programmatic control of laboratory workstations,
      automated liquid handling robots, and integrated automation systems.
    humanURL: https://www.agilent.com/cs/library/usermanuals/public/D0008025_VWorks_API_Reference_Agilent.pdf
    baseURL: https://www.agilent.com
    tags:
      - Laboratory Automation
      - Robotics
      - Liquid Handling
      - Workstation
    properties:
      - type: Documentation
        url: https://www.agilent.com/cs/library/usermanuals/public/D0008025_VWorks_API_Reference_Agilent.pdf
        title: VWorks API Reference Guide v14.0
