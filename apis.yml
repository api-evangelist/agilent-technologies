aid: agilent-technologies
url: https://raw.githubusercontent.com/api-evangelist/agilent-technologies/refs/heads/main/apis.yml
modified: '2026-04-19'
description: >-
  Agilent Technologies is a global leader in life sciences, diagnostics, and
  applied chemical markets, providing instruments, software, services, and
  consumables for laboratory workflows. Agilent offers APIs for laboratory
  operations management including iLab for core facility billing and scheduling,
  SLIMS for laboratory information management, CrossLab Asset Manager for
  instrument management, and VWorks for laboratory automation.
tags:
  - Life Sciences
  - Diagnostics
  - Laboratory
  - Scientific Instruments
  - LIMS
  - Laboratory Automation
apis:
  - name: Agilent iLab Operations API
    description: >-
      The iLab API enables customers to seamlessly integrate outside applications
      with iLab's billing and reporting modules. It leverages a RESTful
      application architecture with HATEOAS (Hypermedia as the Engine of
      Application State) and OAuth2 for secure access. The API supports
      integrations with institutional financial systems such as SAP,
      Oracle/PeopleSoft, Lawson, and Banner, as well as identity management
      systems and LIMS.
    humanURL: https://help.ilab.agilent.com/ilab-api
    baseURL: https://api.ilabsolutions.com/v1
    tags:
      - Laboratory Operations
      - Billing
      - Core Facilities
      - Scheduling
    properties:
      - type: Documentation
        url: https://help.ilab.agilent.com/ilab-api
      - type: Authentication
        url: https://help.ilab.agilent.com/ilab-api
