description: FOCUS-aligned FinOps shape for Agilent's lab software portfolio. Pricing is custom (per-product
  contract or instrument-bundled) rather than a public usage-based rate card; FinOps focus is allocating
  spend by lab / instrument / facility and tying it to scientific throughput.
notes: No public pricing; meters reflect the contract dimensions Agilent typically uses (instruments,
  seats, samples) plus API request volume customers can self-track.
sources:
  - https://www.agilent.com/
billingModel:
  pricingCategory: Custom Contract / License
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Agilent Lab Software Portfolio
  ServiceCategory: Life Sciences / Lab Software
  ProviderName: Agilent Technologies
  PublisherName: Agilent Technologies, Inc.
  InvoiceIssuerName: Agilent Technologies, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: ilab_subscription
    description: iLab Operations Software subscription (typically per facility / per institution)
    unit: subscription-month
    aggregation: sum
    dimensions:
      - facility
      - module
  - name: slims_license
    description: SLIMS LIMS license (per seat or per environment)
    unit: license-month
    aggregation: sum
    dimensions:
      - seat
      - environment
  - name: crosslab_service_contract
    description: CrossLab service contract covering instrument maintenance and asset management
    unit: contract-month
    aggregation: sum
    dimensions:
      - instrument
      - service_tier
  - name: vworks_license
    description: VWorks lab-automation software license per workstation
    unit: license-month
    aggregation: sum
    dimensions:
      - workstation
  - name: api_requests
    description: API requests against any Agilent product API (customer-side telemetry only)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - tier
principles:
  - name: Visibility
    description: Track Agilent costs from product invoices and CrossLab service-contract statements; for
      API request visibility, instrument it client-side since Agilent does not expose a unified usage API.
  - name: Allocation
    description: Allocate by instrument serial number, facility, and lab / cost center — these are the
      same dimensions Agilent uses to scope contracts.
  - name: Optimization
    description: Optimize by right-sizing iLab seat counts, retiring unused SLIMS environments, and
      negotiating CrossLab tiers to match instrument criticality (response-time SLAs vs basic coverage).
  - name: Accountability
    description: Lab operations / core-facility leadership owns Agilent spend; align reviews with the
      annual CrossLab and SLIMS renewal cycles and instrument capital cycles.
maintainers:
